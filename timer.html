     <li style="list-style-image: url(checklist\ 1.png);"> <a href="checklist.html" class="tt">Checklist</a> </li>

<select id="themeSelect">
  <option value="" selected>🎨</option>
  <option value="black">Black</option>
  <option value="pink">Pink</option>
  <option value="blue">Blue</option>
  <option value="green">Green</option>
  <option value="yellow">Yellow</option>
  <option value="red">Red</option>
  <option value="orange">Orange</option>
  <option value="brown">Brown/Beige</option>
  <option value="purple">Purple</option>
</select>  

<div id="paper">

<label class="title"> Timer </label> 
<span id="numbers"><h1 id="tim-min">00</h1><h1>:</h1><h1 id="tim-sec">00</h1></span>

<div id="inputs">
 <input type="number" id="min" class="timer-num" placeholder="Minutes">
 <input type="number" id="sec" class="timer-num" placeholder="Seconds">  
</div>

<span id="controls" ><button id="timer-start" onclick="startTimer()" class="buttons"> Start </button> <button id="pause-btn" onclick="togglePause()" class="buttons">Pause</button></span>



</body>  













<script>

let minutes = 0;
let seconds = 0;
let timerInterval = null; 


const user_minutes = document.getElementById("min");
const user_seconds = document.getElementById("sec");
const pauseButton = document.getElementById("pause-btn");


function isValidInput(min, sec) {
    
    if (Number(sec) > 60) {
        alert("Invalid. The seconds must be 60 or less.");
        return false;
    }
    
    if (Number(min) < 0 || Number(sec) < 0) {
        alert("Invalid. Time cannot be negative!");
        return false;
    }
    return true; 
}


function startTimer() {
    
    clearInterval(timerInterval);

    let inputMin = user_minutes.value;
    let inputSec = user_seconds.value;

   
    if (!isValidInput(inputMin, inputSec)) {
        return; 
    }

    
    minutes = Number(inputMin);
    seconds = Number(inputSec);

    
    if (pauseButton) {
        pauseButton.textContent = "Pause";
    }

    
    updateDisplay();

    
    timerInterval = setInterval(countdownRules, 1000);
}


function countdownRules() {
    
    if (minutes === 0 && seconds === 0) {
        clearInterval(timerInterval);
        alert("Time is up!");
        if (pauseButton) pauseButton.textContent = "Pause";
        return;
    } 
   
    else if (seconds === 0) {
        minutes = minutes - 1;
        seconds = 59;
    } 
    
    else {
        seconds = seconds - 1; 
    }

    
    updateDisplay();
}


function togglePause() {

    if (timerInterval === null && minutes === 0 && seconds === 0) return;

    if (pauseButton.textContent === "Pause") {
        
        clearInterval(timerInterval);   
        pauseButton.textContent = "Resume"; 
    } else {
        
        timerInterval = setInterval(countdownRules, 1000); 
        pauseButton.textContent = "Pause";  
    }
}


function updateDisplay() {
    document.getElementById("tim-min").textContent = minutes.toString().padStart(2, '0');
    document.getElementById("tim-sec").textContent = seconds.toString().padStart(2, '0');
}

const themes = {
  black: { bg: "white", border: "black", check:'white' },  
  pink: { bg: "#FFF1F1", border: "#dda6a9", check: 'pink' },
  blue: { bg: "#CBDCEB", border: "#809eb9", check: 'blue' },
  green: { bg: "#F1F3E0", border: "#A1BC98", check:'green' },
  yellow: { bg: "#FFF8DE", border: "#edca07dd", check:'yellow' },
  red: { bg: "#ff908a", border: "#BF1A1A", check:'red' },
  orange: { bg: "#F9B487", border: "#EF7722", check:'orange' },
  brown: { bg: "#E6D8C3", border: "#7B542F", check:'beige' },
  purple:{ bg: "#e9e2ff", border: "#8D5F8C", check:'purple' }
};

const select = document.getElementById("themeSelect");

select.addEventListener("change", (e) => {
  const theme = themes[e.target.value];
  if (!theme) return;  
  for (let key in theme) {
    document.documentElement.style.setProperty(`--${key}`, theme[key]);
  }

  localStorage.setItem("selectedTheme", e.target.value);

  select.value = "";

});

document.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("selectedTheme");
  if (saved && themes[saved]) {
    const theme = themes[saved];
    for (let key in theme) {
      document.documentElement.style.setProperty(`--${key}`, theme[key]);
    }
    select.value = saved;
  }

  select.value = "";
});

</script>
